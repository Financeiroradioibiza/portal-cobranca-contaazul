[build]
  # Retries contra Neon cold start / rede; docs em README («Netlify + Neon»).
  command = "node scripts/netlify-migrate.mjs && npm run build"
  # Sem isso o Netlify assume publish = raiz do repo (= base) e o plugin Next falha.
  publish = ".next"

[build.environment]
  # Next.js 16 exige Node recente; evita falhas soltas no plugin/runtime
  NODE_VERSION = "22"
  # Middleware no Edge tem limite de CPU curto; rodar no origin evita "edge function timed out".
  NEXT_DISABLE_NETLIFY_EDGE = "true"

# Timeout de função Netlify (~10s Free, ~26s Pro). `maxDuration` no route ajuda no Vercel/pro.
# Planilha Rio: deixe `RIO_SYNC_CONTRACTS_DEFAULT` desligado para sync rápido sem varrer /v1/contratos por cliente.
# RIO_SYNC_CONTRACTS_DEFAULT="1"

# Não declare [[plugins]] @netlify/plugin-nextjs aqui se o site já usa
# "Next.js" no painel da Netlify — plugin duplicado causa "Build failed due to a plugin error".
# Runtime Next é aplicado automaticamente: https://docs.netlify.com/frameworks/next-js/overview/
